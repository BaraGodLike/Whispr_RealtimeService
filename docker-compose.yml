services:
  realtime-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whispr-realtime-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Realtime__ServiceName: ${REALTIME_SERVICE_NAME}
      Realtime__NodeId: ${REALTIME_NODE_ID}
      Redis__Configuration: redis:6379
      MailboxGrpc__Address: ${MAILBOX_GRPC_ADDRESS}
      RelayGrpc__Address: ${RELAY_GRPC_ADDRESS}
      Kafka__BootstrapServers: kafka:9092
      Kafka__Topic: ${KAFKA_TOPIC}
      Kafka__GroupIdPrefix: ${KAFKA_GROUP_ID_PREFIX}
    ports:
      - "${REALTIME_SERVICE_PORT}:8080"
    networks:
      - whispr

  redis:
    image: redis:7.4-alpine
    container_name: whispr-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whispr

  redisinsight:
    image: redis/redisinsight:latest
    container_name: whispr-redisinsight
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${REDIS_INSIGHT_PORT}:5540"
    volumes:
      - redisinsight-data:/data
    networks:
      - whispr

  kafka:
    image: bitnami/kafka:4.0
    container_name: whispr-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_EXTERNAL_PORT}:9094"
    environment:
      KAFKA_KRAFT_CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT}
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - whispr

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: whispr-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: whispr-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_READONLY: "false"
    ports:
      - "${KAFKA_UI_PORT}:8080"
    networks:
      - whispr

volumes:
  redis-data:
  redisinsight-data:
  kafka-data:

networks:
  whispr:
    driver: bridge
